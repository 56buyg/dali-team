  <rect x="635" y="298" width="8" height="14" rx="1" fill="none" stroke="#FF6A00" stroke-width="1" opacity="0.2" transform="rotate(3 639 305)"/>
  <rect x="655" y="302" width="8" height="10" rx="1" fill="none" stroke="#018DFF" stroke-width="1" opacity="0.2" transform="rotate(3 659 307)"/>

