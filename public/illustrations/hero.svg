  <circle cx="440" cy="330" r="5" fill="none" stroke="#343433" stroke-width="0.8" opacity="0.12"/>
  <circle cx="400" cy="335" r="4" fill="none" stroke="#343433" stroke-width="0.8" opacity="0.1"/>
